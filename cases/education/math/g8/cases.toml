# --- Cross-family negative tests ---
# Assert INH where split regimes have no defined split pressure.
# These confirm that regime behavior does not leak across transformation families.
# A failure here means the registry has an unexpected PRS/BRK entry
# or the engine is misrouting a transformation.

# ENR-L and ENR-I: no split pressure under decomposition or nor_reorg

[[case]]
id = "edu-math-g8-enr-l-decomp-neg"
domain = "education.math.g8"
description = "ENR-L has no defined response to decomposition. Decomposing a G8 standards context does not act on locus identity of the referent."
candidate_regime = "ENR-L"
transformations = ["decomposition"]
notes = "Negative test: ENR-L is defined only under BF. Decomposition must be INH."
[[case.expected]]
after = "decomposition"
regime = "ENR-L"
outcome = "INH"

[[case]]
